name: Build Matter Examples

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Build on Mondays at 9am PST every week
    - cron:  '0 17 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/esp-matter:latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Swift & CMake
        run: |
            set -vex
            pwd
            ls
            ls /
            wget https://download.swift.org/development/ubuntu2204/swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a/swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a-ubuntu22.04.tar.gz
            tar xzf swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a-ubuntu22.04.tar.gz
            export PATH="$PATH:`pwd`/swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a-ubuntu22.04/usr/bin/"
            echo $PATH
            ls -al `pwd`
            ls -al `pwd`/swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a-ubuntu22.04
            ls -al `pwd`/swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a-ubuntu22.04/usr
            ls -al `pwd`/swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a-ubuntu22.04/usr/bin
            `pwd`/swift-DEVELOPMENT-SNAPSHOT-2024-12-04-a-ubuntu22.04/usr/bin/swiftc --version
            
            swiftc --version

            wget https://github.com/Kitware/CMake/releases/download/v3.30.2/cmake-3.30.2-linux-x86_64.tar.gz
            tar xzf cmake-3.30.2-linux-x86_64.tar.gz
            export PATH="`pwd`/cmake-3.30.2-linux-x86_64/bin:$PATH"
            cmake --version

            echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Build with idf.py
        run: |
            pwd
            cd /opt/espressif/esp-idf
            . ./export.sh
            cd -
            cd /opt/espressif/esp-matter
            . ./export.sh
            cd -
            cd smart-light/
            idf.py set-target esp32c6 &&
            idf.py build
